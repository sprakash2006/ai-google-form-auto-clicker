<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Form Auto Clicker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      min-width: 220px;
      padding: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h3>Auto Clicker</h3>
  <label for="apiKey">Cohere API Key:</label>
  <input type="password" id="apiKey" placeholder="Enter Cohere Key" style="width: 100%; margin-bottom: 10px; padding: 5px;">
  <button id="saveKey" style="margin-bottom: 10px; background-color: #4CAF50; color: white;">Save Key</button>
  <button id="run">Run on Mock Form</button>
  <p id="status" style="font-size: 12px; color: gray;"></p>

  <script src="popup.js"></script>
</body>
</html>
